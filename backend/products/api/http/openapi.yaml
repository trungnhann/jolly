openapi: "3.0.0"
info:
  version: 1.0.0
  title: Products
  contact:
    name: jolly
paths:
  /products:
    post:
      summary: Create a new product
      operationId: createProduct
      tags:
        - products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      summary: List all products
      operationId: listProducts
      tags:
        - products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /products/{product_uuid}:
    get:
      summary: Get product by UUID
      operationId: getProduct
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update product details
      operationId: updateProduct
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProduct"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete a product
      operationId: deleteProduct
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
      responses:
        "204":
          description: Product deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{product_uuid}/variants:
    post:
      summary: Add a variant to a product
      operationId: addVariant
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVariant"
      responses:
        "201":
          description: Variant added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{product_uuid}/variants/{variant_uuid}:
    put:
      summary: Update a variant
      operationId: updateVariant
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
        - name: variant_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VariantUUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariant"
      responses:
        "200":
          description: Variant updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      summary: Delete a variant
      operationId: deleteVariant
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
        - name: variant_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VariantUUID"
      responses:
        "200":
          description: Variant deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{product_uuid}/variants/{variant_uuid}/images:
    post:
      summary: Upload a variant image
      operationId: uploadVariantImage
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
        - name: variant_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VariantUUID"
        - name: position
          in: query
          required: false
          schema:
            type: integer
            default: 0
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Variant image uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{product_uuid}/variants/{variant_uuid}/images/{image_uuid}:
    delete:
      summary: Delete a variant image
      operationId: deleteVariantImage
      tags:
        - products
      parameters:
        - name: product_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProductUUID"
        - name: variant_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VariantUUID"
        - name: image_uuid
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VariantImageUUID"
      responses:
        "200":
          description: Variant image deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    CreateProduct:
      type: object
      required:
        - name
        - description
        - status
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/CreateVariant"

    UpdateProduct:
      type: object
      required:
        - name
        - description
        - status
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"

    CreateVariant:
      type: object
      required:
        - sku
        - name
        - price_cents
      properties:
        sku:
          type: string
        name:
          type: string
        price_cents:
          type: integer
          format: int64
          minimum: 0

    UpdateVariant:
      type: object
      required:
        - sku
        - name
        - price_cents
      properties:
        sku:
          type: string
        name:
          type: string
        price_cents:
          type: integer
          format: int64
          minimum: 0

    Product:
      type: object
      required:
        - product_uuid
        - name
        - description
        - status
        - variants
        - created_at
        - updated_at
      properties:
        product_uuid:
          $ref: "#/components/schemas/ProductUUID"
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/Variant"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Variant:
      type: object
      required:
        - variant_uuid
        - product_uuid
        - sku
        - name
        - price_cents
        - images
        - created_at
        - updated_at
      properties:
        variant_uuid:
          $ref: "#/components/schemas/VariantUUID"
        product_uuid:
          $ref: "#/components/schemas/ProductUUID"
        sku:
          type: string
        name:
          type: string
        price_cents:
          type: integer
          format: int64
        images:
          type: array
          items:
            $ref: "#/components/schemas/VariantImage"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VariantImage:
      type: object
      required:
        - image_uuid
        - variant_uuid
        - url
        - position
        - created_at
      properties:
        image_uuid:
          $ref: "#/components/schemas/VariantImageUUID"
        variant_uuid:
          $ref: "#/components/schemas/VariantUUID"
        url:
          type: string
        position:
          type: integer
        created_at:
          type: string
          format: date-time

    ProductUUID:
      type: string
      format: uuid
      description: Unique product identifier
      x-go-type: domain.ProductUUID
      x-go-type-import:
        path: jolly/backend/products/domain

    VariantUUID:
      type: string
      format: uuid
      description: Unique variant identifier
      x-go-type: domain.VariantUUID
      x-go-type-import:
        path: jolly/backend/products/domain

    VariantImageUUID:
      type: string
      format: uuid
      description: Unique variant image identifier
      x-go-type: domain.VariantImageUUID
      x-go-type-import:
        path: jolly/backend/products/domain

    ProductStatus:
      type: string
      enum:
        - draft
        - active
        - archived
      x-go-type: domain.ProductStatus
      x-go-type-import:
        path: jolly/backend/products/domain

    ErrorResponse:
      type: object
      required:
        - message
        - slug
      properties:
        message:
          type: string
        slug:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      properties:
        entity_type:
          type: string
        entity_id:
          type: string
        error_slug:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
